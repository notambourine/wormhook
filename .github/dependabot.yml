version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: "0 9 * * 1,3"
      timezone: America/Chicago
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
