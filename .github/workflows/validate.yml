name: validate

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: this workflow only reads the checkout. Without
# this, the token defaults to write scopes a compromised step could abuse.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Egress monitoring of the runner itself (StepSecurity). Must be the first
      # step. audit = observe-only, never blocks; the per-run insights link in the
      # log shows observed endpoints. Graduate to egress-policy: block + an
      # allowed-endpoints allowlist once a few audit runs have mapped the egress.
      # Community tier is public-repos-only — applies here (wormhook is public).
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only CI (lint/scan, no git push, no .git/ artifact upload), so
          # don't persist the token into .git/config (zizmor artipacked).
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # Socket Firewall Free (keyless) installs the `sfw` proxy into the job;
      # the install step below runs through it so a package flagged malicious
      # AFTER this lockfile-less `npm install -g` resolves still gets blocked at
      # fetch time — the time-of-check->time-of-use gap a PR-time scan can't close.
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - name: Install Claude Code CLI
        run: sfw npm install -g @anthropic-ai/claude-code

      # Schema-validates marketplace.json, plugin.json, and skill/agent/hook
      # frontmatter. --strict promotes unrecognized-field warnings to errors.
      - name: Validate plugin + marketplace schema
        run: claude plugin validate . --strict

      # NB: the two description fields serve DIFFERENT roles by design and are NOT
      # kept in sync -- marketplace.json carries a short browse-list tagline, plugin.json
      # the full IOC detail shown at install/inspect time. There is intentionally no
      # parity check (the platform has no shared-field mechanism, so a copy would only
      # be drift waiting to happen). See CLAUDE.md "Invariants".

      # The hook is the whole product here -- lint it so a broken edit can't ship.
      - name: ShellCheck the scanner
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Default severity floor (style/info), not -S warning: the new CLI is the
          # whole product, and SC2015-class footguns are exactly what we want red.
          # scripts/doctor/*.sh (the split SessionStart checks) are NOT covered by the
          # non-recursive scripts/*.sh glob -- list the subdir explicitly.
          shellcheck scripts/*.sh scripts/doctor/*.sh

      # Presence-assert for the split doctor checks. The jq-missing "scans are OFF" 🔴
      # alarm is owned solely by doctor/deps.sh (every other check stays silent when jq
      # is absent), so a missing/non-exec deps.sh would silently disarm the one alarm the
      # doctor exists to raise. This turns that corruption case into a red PR instead of a
      # user's silent SessionStart. _utils.sh is sourced (not executed), so it is checked
      # for existence only, not the +x bit.
      - name: Assert doctor checks present + executable
        run: |
          test -f scripts/doctor/_utils.sh || { echo "::error::scripts/doctor/_utils.sh missing"; exit 1; }
          # Derive the check list from hooks.json (single source of truth) — no hand-maintained
          # list or count to drift. Each registered check must exist + be executable; deps.sh must
          # be FIRST (absent or not-first and the jq-missing alarm it owns silently never fires).
          checks=$(jq -r '.hooks.SessionStart[].hooks[].command | select(test("doctor/")) | capture("doctor/(?<f>[a-z_-]+[.]sh)").f' hooks/hooks.json)
          [ -n "$checks" ] || { echo "::error::no doctor checks registered in hooks.json"; exit 1; }
          [ "$(printf '%s\n' "$checks" | head -1)" = "deps.sh" ] || { echo "::error::deps.sh must be the first SessionStart doctor hook"; exit 1; }
          printf '%s\n' "$checks" | while read -r c; do
            f="scripts/doctor/$c"
            test -f "$f" || { echo "::error file=$f::registered doctor check missing"; exit 1; }
            test -x "$f" || { echo "::error file=$f::doctor check not executable (chmod +x)"; exit 1; }
          done
          echo "registered doctor checks present + executable; deps.sh first"

      # Versioning is manual; this tripwire turns "forgot to bump" into a red X
      # instead of silent drift. Behavior lives in scripts/ + hooks/ -- docs- and
      # CI-only PRs need no bump. Diffs against the PR's recorded base SHA (exact
      # "what this PR changes", immune to base-branch drift); the sort -V check
      # additionally requires the version to move FORWARD, not merely differ.
      - name: Require version bump when behavior changes (PRs only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          if git diff --quiet "$BASE_SHA" HEAD -- scripts/ hooks/; then
            echo "no behavior change (scripts/, hooks/) -- version bump not required"
            exit 0
          fi
          old=$(git show "$BASE_SHA:.claude-plugin/plugin.json" | jq -r '.version // "0.0.0"')
          new=$(jq -r '.version // "0.0.0"' .claude-plugin/plugin.json)
          if [ "$old" = "$new" ]; then
            echo "::error file=.claude-plugin/plugin.json::scripts/ or hooks/ changed but version is still $old -- bump it (fix: patch, feat: minor, breaking: major)"
            exit 1
          fi
          if [ "$(printf '%s\n%s\n' "$old" "$new" | sort -V | tail -n1)" != "$new" ]; then
            echo "::error file=.claude-plugin/plugin.json::version went backwards: $old -> $new"
            exit 1
          fi
          echo "version bump OK: $old -> $new"

  # ── Dogfood: run wormhook's OWN action.yml against wormhook's own tree ──
  # action.yml ("run the engine in CI") ships in this repo but had no coverage on
  # its own source. This exercises it on every push/PR and self-asserts the tree is
  # clean by the exact engine the plugin ships -- eat our own dog food. harden-runner
  # in audit mode doubles as evidence for the "no network calls -- ever" invariant:
  # the run's egress-insights link shows the scan step makes zero outbound calls.
  # Source-only tree (no node_modules to deep-walk) -> mode: fast.
  wormhook-self:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only CI (lint/scan, no git push, no .git/ artifact upload), so
          # don't persist the token into .git/config (zizmor artipacked).
          persist-credentials: false
      - name: Scan this repo with wormhook's own action
        uses: ./
        with:
          mode: fast

  # ── Complementary layer: shai-hulud-tripwire (committed-persistence artifacts) ──
  # wormhook's block tier DELIBERATELY does not flag generic secrets-context workflow
  # exfil or pull_request_target abuse -- too FP-prone (malware-patterns.sh
  # MALWARE_WORKFLOW_RE matches only named campaign slugs). This reusable workflow
  # specializes in exactly that tree-committed persistence pattern, so it is additive,
  # not redundant. Offline + zero-secret (contents: read). Non-gating here: validate
  # holds no secrets to gate via needs:, so the value is as a required status check
  # behind a branch ruleset, not as a job barrier. allow-globs MIRRORS the in-tree
  # .tripwire-allow so CI and the local SessionStart tripwire hook agree on what is a
  # documented-IOC false positive (filename/hash/lifecycle hits are never exempted).
  tripwire:
    uses: notambourine/shai-hulud-tripwire/.github/workflows/tripwire.yml@be65cdd4c400f998a0145b1d6c9f177e472f0e81 # v1.1.0
    permissions:
      contents: read
    with:
      allow-globs: |
        README.md
        scripts/wormhook.sh
        scripts/malware-patterns.sh
